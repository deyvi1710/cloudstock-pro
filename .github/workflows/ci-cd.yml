name: CloudStock Pro CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  ci-pipeline:
    name: Build & Test Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout del Repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Instalar dependencias del Backend
        run: npm install
        working-directory: ./backend

      - name: 🧪 Tests del Backend
        run: npm test
        working-directory: ./backend

      - name: 📦 Instalar dependencias del Frontend
        run: npm install
        working-directory: ./frontend

      - name: 🏗️ Build del Frontend (Vite)
        run: npm run build
        working-directory: ./frontend

      - name: 🧪 Tests del Frontend
        run: npm test
        working-directory: ./frontend

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build imagen Backend
        run: docker build -f docker/backend.Dockerfile -t cloudstock-backend:latest .

      - name: 🐳 Build imagen Frontend
        run: docker build -f docker/frontend.Dockerfile -t cloudstock-frontend:latest .

      - name: 🚀 Levantar servicios con Docker Compose
        run: docker compose up -d
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}

      - name: ⏳ Esperar que los servicios estén listos
        run: sleep 15

      - name: 🔍 Verificar Backend Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          echo "Backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Backend no responde"
            docker compose logs backend
            exit 1
          fi
          echo "✅ Backend OK"

      - name: 🔍 Verificar Frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80)
          echo "Frontend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Frontend no responde"
            docker compose logs frontend
            exit 1
          fi
          echo "✅ Frontend OK"

      - name: 📋 Logs de contenedores
        if: always()
        run: docker compose logs

      - name: 🛑 Detener contenedores
        if: always()
        run: docker compose down

      - name: 🎉 Pipeline completado
        run: |
          echo "================================"
          echo "✅ CloudStock Pro CI/CD Exitoso"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "================================"
